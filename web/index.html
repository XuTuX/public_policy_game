<!DOCTYPE html>
<html lang="ko">
<head>

    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4F46E5">
  <meta name="color-scheme" content="light">
  <meta name="description" content="실제 국회 법안을 쉽게 살펴보고 직접 표결하며 나와 의견이 비슷한 국회의원을 찾아보는 참여형 웹 게임입니다.">
  <meta name="robots" content="index, follow">

  <meta property="og:type" content="website">
  <meta property="og:locale" content="ko_KR">
  <meta property="og:title" content="오늘부터 국회의원">
  <meta property="og:description" content="국회 법안을 살펴보고 직접 표결해 나와 의견이 비슷한 국회의원을 찾아보세요.">
  <meta name="twitter:card" content="summary">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="오늘부터 국회의원">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>오늘부터 국회의원</title>
  <link rel="manifest" href="manifest.json">

  <!-- 웹 로드 속도 향상 및 한글 폰트 깨짐 방지 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <script src="https://github.com/corbado/flutter-passkeys/releases/download/2.4.0/bundle.js"></script>
  <script src="flutter_bootstrap.js" async></script>
